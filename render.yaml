services:
  - type: web
    name: smartflow-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./smartflow.db
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: smartflow-frontend
    runtime: node
    nodeVersion: "18"
    buildCommand: npm ci && npm run build
    startCommand: npm start
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://smartflow-backend.onrender.com

  - type: web
    name: smartflow-whatsapp
    runtime: node
    nodeVersion: "18"
    buildCommand: npm ci
    startCommand: npm start
    rootDir: whatsapp-bridge
    envVars:
      - key: BACKEND_URL
        value: https://smartflow-backend.onrender.com
